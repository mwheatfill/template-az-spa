name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

# Single in-flight deploy per ref; cancel superseded ones.
concurrency:
  group: swa-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
          lfs: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Substitute tenant id into staticwebapp.config.json
        env:
          AAD_TENANT_ID: ${{ vars.AAD_TENANT_ID }}
        run: |
          if [ -z "$AAD_TENANT_ID" ]; then
            echo "::error::AAD_TENANT_ID repository variable is not set. Run scripts/azure-deploy.sh first."
            exit 1
          fi
          envsubst '${AAD_TENANT_ID}' < staticwebapp.config.json > staticwebapp.config.json.tmp
          mv staticwebapp.config.json.tmp staticwebapp.config.json
          if grep -q '__TENANT_ID__' staticwebapp.config.json; then
            echo "::error::Substitution failed; placeholder still present"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Copy SWA config into dist
        run: cp staticwebapp.config.json dist/staticwebapp.config.json

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "dist"
          api_location: "api"
          output_location: ""
          skip_app_build: true

  close_pr:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR preview
    steps:
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
